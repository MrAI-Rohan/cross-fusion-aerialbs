# To check if two runs with identical configs produce the same results with zero dataloader workers.

experiment_name: unet_whu_nw0
seed: 42
num_workers: 0
tags: ["cosine_warmup_clamp", "tmax_60"]

model:
  encoder: swin_t
  timm_name: swin_tiny_patch4_window7_224.ms_in22k_ft_in1k
  decoder: unet
  cfenet: false
  pretrained: true

data:
  dataset: whu
  patch_size: 224
  train_batch_size: 32
  val_batch_size: 128
  samples_per_epoch: 1000
  train_transform:
    hflip: 0.5
    vflip: 0.5
    rotate90: 0.5
    brightness_contrast: 0.3
    gauss_noise: 0.2
    elastic: 0.2
    grid_distortion: 0.2
  shuffle: true

training:
  epochs: 3
  encoder_lr: 6e-5
  decoder_lr: 6e-4
  cfenet_lr: 6e-4
  progress_bar: false

early_stopping:
  monitor: val_pos_iou
  patience: 15
  mode: max
  min_delta: 0.001

optimizer:
  name: adamw
  params:
    weight_decay: 0.01

scheduler:
  name: cosine_warmup_clamp
  params:
    warmup_epochs: 2
    min_lr_ratio: 0.01
    t_max: 3

checkpoint:
  monitor: val_pos_iou
  mode: max

logging:
  project: CF-AerialBS
